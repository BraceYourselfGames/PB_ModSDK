    id: 1
    text: Fatti strada sulla mappa, partecipa agli eventi, attacca siti ostili. Contendi le province al nemico e scaccia le forze d'occupazione. Usa la base mobile per gestire unità, piloti e migliorie.
    textEng: Navigate the map, participate in events, attack hostile sites. Contest provinces and drive the invasion forces out. Use the mobile base to manage units, pilots and upgrades.
